# Local development stack for the Enterprise AI Platform.
# Brings up the API together with PostgreSQL and Redis.
#
#   docker compose up --build
#
# The API connects to Postgres via async SQLAlchemy and gates its own startup on
# Postgres/Redis reporting healthy. Redis is not used by application code yet.

services:
  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    environment:
      APP_ENVIRONMENT: development
      # Inside the Compose network the database host is the service name `postgres`.
      APP_DATABASE_URL: postgresql+asyncpg://app:app@postgres:5432/app
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      # Readiness probe: also exercises the database connection. Uses http.client so a
      # 503 (not-ready) returns cleanly with exit 1 instead of raising a traceback.
      test:
        - CMD
        - python
        - -c
        - "import http.client,sys; c=http.client.HTTPConnection('localhost',8000,timeout=3); c.request('GET','/health/ready'); sys.exit(0 if c.getresponse().status == 200 else 1)"
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app
      POSTGRES_DB: app
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      # $$ escapes Compose interpolation so the vars expand inside the container,
      # keeping POSTGRES_USER/POSTGRES_DB as the single source of truth.
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

volumes:
  postgres_data:
