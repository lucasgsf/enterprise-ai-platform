name: CI

on:
  push:
    branches: [main]
  pull_request:

# Least-privilege token: this CI only reads code and builds images.
permissions:
  contents: read

# Cancel superseded runs on the same ref — but only for PRs, never for main.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  quality:
    name: API quality (lint, types, tests)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: apps/api
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: "apps/api/uv.lock"
          python-version: "3.12"

      - name: Install dependencies (frozen lockfile)
        run: uv sync --frozen

      - name: Lint (ruff)
        run: uv run ruff check .

      - name: Format check (ruff)
        run: uv run ruff format --check .

      - name: Type check (mypy, strict)
        run: uv run mypy

      - name: Tests (pytest)
        run: uv run pytest

  web:
    name: Web quality (lint, types, build)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: apps/web/package-lock.json

      - name: Install dependencies (clean)
        run: npm ci

      - name: Lint (eslint)
        run: npm run lint

      - name: Type check (tsc)
        run: npm run typecheck

      - name: Build (next build)
        run: npm run build

  docker-build:
    name: Docker image builds
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Build API image
        run: docker build -t enterprise-ai-platform-api:ci apps/api
